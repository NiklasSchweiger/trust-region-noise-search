_partial_: true
_target_: noise_optimization.core.rewards.protein.DesignabilityReward

device: cuda
cache_dir: null
# Optional: Path to ProteinMPNN model weights directory
# If not set, ProteinMPNN will look for weights in proteina/ProteinMPNN/ca_model_weights/
# Download weights first: bash proteina/script_utils/download_pmpnn_weghts.sh
pmpnn_weights_path: null

# Metadata options
metadata:
  # Number of sequences to extract per protein for designability evaluation
  # Each sequence is generated by ProteinMPNN and then refolded with ESMFold
  # Higher values (e.g., 8) give more robust designability scores but are slower
  # Lower values (e.g., 1-4) are faster but may be less reliable
  # Default: 8 (matches inference.py behavior)
  num_seq_per_target: 1

