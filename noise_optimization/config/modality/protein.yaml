# @package _global_
# ============================================================================
# PROTEIN MODALITY (Proteina)
# ============================================================================
# Protein structure generation using Proteina flow matching
# Uses designability reward (scRMSD) to match inference.py evaluation
# Usage: python main.py modality=protein
# ============================================================================

defaults:
  - /benchmark: protein_lengths
  - /reward_function: designability  # Use designability (scRMSD) to match inference.py evaluation
  - /model: proteina

# Set the modality field for pipeline routing
modality: protein

# Proteina-specific settings - matched to inference_base.yaml for optimal rewards
proteina:
  ckpt_path: /path/to/proteina/checkpoints  # Directory containing downloaded Proteina checkpoints
  ckpt_name: proteina_v1.3_DFS_60M_notri.ckpt
  #ckpt_name: proteina_v1.2_DFS_200M_notri.ckpt  # Match inference_base.yaml checkpoint
  n_residues: 100
  dt: 0.0025  # Integration step size (critical for generation quality)
  schedule_mode: log
  schedule_p: 2.0
  sampling_mode: vf  # SELF-CONDITIONING mode gives much better designability rewards than vf at cost of diversity
  sc_scale_noise: 0.4  # Scale noise term in SDE sampling
  sc_scale_score: 1.0  # Scale score term in SDE sampling
  gt_mode: "1/t"       # Guidance schedule mode
  gt_p: 1.0           # Guidance schedule parameter
  gt_clamp_val: null   # Guidance clamping value
  guidance_weight: 1.0 # Overall guidance weight
  autoguidance_ratio: 1.0  # Use autoguidance (matches inference_base.yaml)
  self_cond: false     # Self-conditioning flag
  fold_cond: false     # Fold conditioning flag
  autoguidance_ckpt_path: /path/to/proteina/checkpoints/proteina_v1.8_D21M_400M_tri_autoguidance.ckpt
  lengths: null
  designability_seqs_per_struct: 1  # Match inference_base.yaml - sequences per structure for designability
  benchmark:
    min_length: 50
    max_length: 274
    num_samples: 200
    sample_seed: 42
    shuffle: false
    seed: 5  # Match inference_base.yaml seed
    repeat: 1
    start_index: null
    end_index: null
    num_runs: null
  fold_metric_ckpt: null
  len_cath_code_path: null
  cath_code_level: "T"  # Match inference_base.yaml guidance level
  fold_conditions:
    - fold_code: "1.10.x.x"
    - fold_code: "2.60.x.x"
    - fold_code: "3.40.x.x"
  motif_tasks: null
  # Diversity and novelty tracking (optional, disabled by default)
  track_diversity: false

  # Noise control for deterministic behavior (important for black box solvers)
  use_zero_noise: false  # Set to true for fully deterministic zero noise
  deterministic_seed: null  # Fixed seed for reproducible noise sequences
  noise_seed_offset: 0  # Offset for seed sequences across different calls
